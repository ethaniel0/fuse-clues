hooks:
  unlink:
    - condition: always
      actions:
        - allow: false
  rmdir:
    - condition: always
      actions:
        - allow: false
  readdir:
    - condition:
        not:
          file_exists: "../../../../shared_folder/RAID_Paper_Poster.txt" 
      actions:
        - value: ""

  getattr:
    - condition:
        not:
          file_exists: "../../../../shared_folder/RAID_Paper_Poster.txt"
      actions:
        - value: ""
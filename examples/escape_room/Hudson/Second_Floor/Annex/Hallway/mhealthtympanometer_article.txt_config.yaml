hooks:
  unlink:
    - condition: always
      actions:
        - error: access_denied
  rmdir:
    - condition: always
      actions:
        - error: access_denied
  readdir:
    - condition:
        not:
          file_exists: "../../../../shared_folder/RAID_Paper_Poster.txt"
      actions:
        - value: null

  getattr:
    - condition:
        not:
          file_exists: "../../../../shared_folder/RAID_Paper_Poster.txt"
      actions:
        - value: null



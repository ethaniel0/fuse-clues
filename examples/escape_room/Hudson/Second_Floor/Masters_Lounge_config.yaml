hooks:
  unlink:
    - condition: always
      actions:
        - error: access_denied
  rmdir:
    - condition: always
      actions:
        - error: access_denied
  getattr:
    - condition:
        not:
          file_content_contains:
            path: "../Basement/Chris_Bingham_Office/checkpoint_4_answer.txt"
            expected_substring: "(?i)Second_Floor/Masters_Lounge"
      actions:
        - error: no_exist

  readdir:
    - condition:
        not:
          file_content_contains:
            path: "../Basement/Chris_Bingham_Office/checkpoint_4_answer.txt"
            expected_substring: "(?i)Second_Floor/Masters_Lounge"
      actions:
        - value: ""

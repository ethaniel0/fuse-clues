hooks:
  unlink:
    - condition: always
      actions:
        - error: access_denied
  rmdir:
    - condition: always
      actions:
        - error: access_denied
  readdir:
    - condition:
        not:
          file_content_contains:
            path: "../ip_addr.txt"
            expected_substring: "(?i)236"
      actions:
        - value: ""
  getattr:
    - condition:
        not:
          file_content_contains:
            path: "../ip_addr.txt"
            expected_substring: "(?i)236"
      actions:
        - value: null
        
hooks:
  unlink:
    - condition: always
      actions:
        - error: access_denied
  rmdir:
    - condition: always
      actions:
        - error: access_denied
        
  getattr:
    - condition:
        not:
          file_content_contains:
            path: "First_Floor/ECE_Display_Board/checkpoint_3_answer.txt"
            expected_substring: "(?i)Hudson/Basement"
      actions:
        - error: no_exist

  readdir:
    - condition:
        not:
          file_content_contains:
            path: "First_Floor/ECE_Display_Board/checkpoint_3_answer.txt"
            expected_substring: "(?i)Hudson/Basement"
      actions:
        - value: ""

hooks:
  readdir:
    - condition:
        not:
          file_content_contains:
            path: "../white_board.txt"
            expected_substring: "1011010"
      actions:
        - value: ""

  getattr:
    - condition:
        not:
          file_content_contains:
            path: "../white_board.txt"
            expected_substring: "1011010"
      actions:
        - error: no_exist

  access:
    - condition:
        not:
          file_content_contains:
            path: "../white_board.txt"
            expected_substring: "1011010"
      actions:
        - error: access_denied
hooks:
  readdir:
    - condition:
        not:
          file_content_contains:
            path: "reader.txt"
            expected_substring: "status: unlocked"
      actions:
        - value: ""

  getattr:
    - condition:
        not:
          file_content_contains:
            path: "reader.txt"
            expected_substring: "status: unlocked"
      actions:
        - value: null

  access:
    - condition:
        not:
          file_content_contains:
            path: "reader.txt"
            expected_substring: "status: unlocked"
      actions:
        - error: access_denied
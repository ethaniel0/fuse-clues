hooks:
  readdir:
    - condition: &locked_condition
        not:
          all:
            - file_exists: "../panel/terminal_A/red_wire"
            - file_exists: "../panel/terminal_B/green_wire"
            - file_exists: "../panel/terminal_C/blue_wire"
            - file_size:
                path: "../panel/terminal_A/red_wire"
                threshold: 12
                mode: eq
            - file_size:
                path: "../panel/terminal_B/green_wire"
                threshold: 8
                mode: eq
            - file_size:
                path: "../panel/terminal_C/blue_wire"
                threshold: 14
                mode: eq              
      actions:
        - value: ""

  getattr:
    - condition: *locked_condition
      actions:
        - error: no_exist

  access:
    - condition: *locked_condition
      actions:
        - error: access_denied


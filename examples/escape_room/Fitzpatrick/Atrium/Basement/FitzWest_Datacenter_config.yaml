hooks:
  access:
    - condition: &locked
        not:
          all:
            - file_content_matches:
                path: id_scanner/*
                expected_content: "zmnzR9mfGGnre"
            - permissions_equals: 
                path: id_scanner/*
                permissions: "rwx-wxrw-"
      actions:
        - error: access_denied
  readdir_search:
    - condition: *locked
      actions:
        - error: access_denied
  rmdir:
    - condition: always
      actions:
        - error: access_denied


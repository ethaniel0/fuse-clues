hooks:
  readdir:
    - condition: &unlocked_condition
        all:
          - not:
            file_not_exists: "unlock"
          - attribute_equals:
              name: "unlock"
              value: "unlocked"
      actions:
        - set_value: ""
        - write_attribute:
            name: "unlock"
            value: "unlocked"
  read:
    - condition: *unlocked_condition
      actions:
        - visibility: false